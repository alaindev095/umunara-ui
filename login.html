<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Umunara</title>
    <link rel="shortcut icon" href="images/logo1.png" type="image/x-icon">
    <link rel="stylesheet" href="form_style.css">
</head>
<body>
    <div class="container">
        <form id="form">
            <img src="images/logo1.png" alt="Umunara" class="logo">
            <input type="text" id="identifier" placeholder="Email or Phone number" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit" id="submit">Login</button>
        </form>
        <p>Don't have account? <a href="register.html">Register</a></p>
        <p id="info"></p>
    </div>

    <script>
        const button = document.getElementById('submit');
        const form = document.getElementById('form');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            button.disabled = true;
            button.innerHTML = 'Logging in ...';
            button.style.background = '#ccc'

            const identifier = document.getElementById("identifier").value.trim();
            const password = document.getElementById("password").value.trim();
            const info = document.getElementById('info');
            info.innerHTML = '';

            try {
                const response = await fetch("http://localhost:5000/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ identifier,password })
                });

                const data = await response.json();

                if(data.error) {
                    info.innerHTML = data.error;
                    info.style.color = 'red'
                }
                else if(data.message) {
                    info.innerHTML = data.message;
                    info.style.color = 'green';
                    localStorage.setItem("token", data.token );
                    form.reset();
                    setTimeout(() => window.location.href = "index.html", 2000);
                }
            }
            catch(error) {
                console.error(error);
                info.innerHTML = "something went wrong";
                info.style.color = 'red';
            }
            finally {
                button.disabled = false;
                button.innerHTML = 'Login';
                button.style.background = "";  
            }
        });
    </script>
</body>
</html>
